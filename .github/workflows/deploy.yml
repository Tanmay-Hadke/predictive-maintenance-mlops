name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/predictive-maintenance:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kubernetes credentials (Base64 Decode)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Debug kubeconfig structure
        run: |
          echo "First character: $(head -c 1 ~/.kube/config | od -c)"
          echo "Last character: $(tail -c 1 ~/.kube/config | od -c)"
          echo "Line count: $(wc -l < ~/.kube/config)"
          echo "First 80 chars (escaped):"
          head -c 80 ~/.kube/config | cat -A

      - name: Verify cluster connection
        run: kubectl config view --minify

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ --validate=false
          kubectl apply -f monitoring/ --validate=false
          kubectl rollout restart deployment/predictive-maintenance-deployment

      - name: Debug kubeconfig
        run: head -c 200 ~/.kube/config