name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    # 1. Change this from ubuntu-latest to self-hosted
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/predictive-maintenance:latest

      # 2. Delete all the Base64 and Kubeconfig setup steps. 
      # The runner will natively use your local ~/.kube/config!

      - name: Verify local Minikube connection
        run: kubectl config current-context

      - name: Deploy to Kubernetes
        run: |
          # 1. Apply all your core application and monitoring manifests at once
          kubectl apply -f k8s/ --validate=false
          
          # 2. Trigger your rolling update
          kubectl rollout restart deployment/predictive-maintenance-api
