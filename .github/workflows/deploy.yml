name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # Updated to v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # Updated to v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/predictive-maintenance:latest

      - name: Deploy to Kubernetes
        run: |
          # 1. Apply infrastructure manifests
          kubectl apply -f k8s/
          
          # 2. Apply monitoring and alerting configurations
          # This ensures your Prometheus rules are always up to date
          kubectl apply -f monitoring/
          
          # 3. Trigger rollout to restart pods with the new image
          kubectl rollout restart deployment/predictive-maintenance-deployment