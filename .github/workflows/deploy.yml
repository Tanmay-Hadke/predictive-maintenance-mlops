name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3 # Updated to v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # Updated to v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/predictive-maintenance:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Create Kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Debug kubeconfig structure
        run: |
          echo "First character: $(head -c 1 "$KUBECONFIG" | od -c)"
          echo "Last character: $(tail -c 1 "$KUBECONFIG" | od -c)"
          echo "Line count: $(wc -l < "$KUBECONFIG")"
          echo "First 80 chars (escaped):"
          head -c 80 "$KUBECONFIG" | cat -A

      - name: Verify cluster connection
        run: kubectl config view --minify

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ --validate=false
      - name: Debug kubeconfig
        run: head -c 200 "$KUBECONFIG"